# apphosting.yaml

build:
  steps:
    - name: fetch                
      uri: ${SOURCE_TARBALL_URL}

    - name: setup
      entrypoint: bash
      args: ["-lc", "npm ci --include=dev"]

    - name: build
      entrypoint: bash
      args: ["-lc", "npm run build"]

    - name: bundle
      entrypoint: bash
      args: ["-lc", "cp -R . ${BUILD_DIR}"]

runConfig:
  minInstances: 0
  maxInstances: 20
  concurrency: 100
  cpu: 1
  memoryMiB: 768

env:
  # === Existing Variables ===
  - variable: APOLLO_API_KEY
    secret: APOLLO_API_KEY
    availability: [RUNTIME]

  # === Lead providers (Apollo/PDL trial) ===
  - variable: LEADS_PROVIDER_DEFAULT
    value: apollo
    availability: [RUNTIME]

  - variable: ENRICHMENT_PROVIDER_DEFAULT
    value: apollo
    availability: [RUNTIME]

  - variable: PDL_TRIAL_ENABLED
    value: "false"
    availability: [RUNTIME]

  - variable: PDL_BASE_URL
    value: https://api.peopledatalabs.com/v5
    availability: [RUNTIME]

  - variable: PDL_TIMEOUT_MS
    value: "30000"
    availability: [RUNTIME]

  - variable: PDL_SEARCH_PAGE_SIZE
    value: "100"
    availability: [RUNTIME]

  - variable: PDL_SEARCH_MAX_PAGES
    value: "10"
    availability: [RUNTIME]

  - variable: PDL_MAX_RESULTS
    value: "200"
    availability: [RUNTIME]

  - variable: PDL_ENRICH_MIN_LIKELIHOOD
    value: "2"
    availability: [RUNTIME]

  - variable: PDL_FALLBACK_TO_APOLLO
    value: "true"
